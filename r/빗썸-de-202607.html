  <div id="report"><h2>x</h2>
<h2>y</h2>
<h2>z</h2></div>
  <div class="ad">AD · 광고</div>
  <div class="cta-sub">이 회사, 내 이력으론 지원할 가치가 있을까?</div>
  <a class="cta" href="https://jobrecon.100m1s.com">내 이력으로 적합도·평결 받기 →</a>
  <div class="foot">JobRecon · 기업 코멘트는 DART 공시·공개 뉴스·LLM 기반 · 근거 없는 단정 없이 "확인 필요"로 안내합니다.<br>개인 평결(적합·판단)은 이 페이지에 포함되지 않습니다 — 앱에서 내 프로필 기반으로만 제공됩니다.</div>
</div>
<script>
(function(){
  var API=(window.JOBRECON_API||"").replace(/\/+$/,"");
  function ensureAPI(){
    if(API)return Promise.resolve(API);
    return fetch("/api.txt",{cache:"no-store"}).then(function(r){return r.ok?r.text():"";})
      .then(function(t){API=(t||"").trim().replace(/\/+$/,"");return API;}).catch(function(){return API;});
  }
  function esc(s){return (s||"").replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});}
  function mdInline(s){return s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/`([^`]+)`/g,"<code>$1</code>");}
  function renderMd(t){
    var lines=esc(t).split("\n"),html="",stack=[];
    function closeTo(d){while(stack.length>d)html+="</"+stack.pop()+">";}
    for(var i=0;i<lines.length;i++){
      var line=lines[i].replace(/\s+$/,"");
      var bm=line.match(/^(\s*)[-•]\s+(.*)$/),nm=line.match(/^(\s*)\d+\.\s+(.*)$/);
      if(bm||nm){
        var indent=(bm?bm[1]:nm[1]).replace(/\t/g,"  ").length;
        var depth=indent>=4?3:(indent>=2?2:1),tag=nm?"ol":"ul";
        closeTo(depth);
        if(stack.length<depth){html+="<"+tag+">";stack.push(tag);}
        html+="<li>"+mdInline(bm?bm[2]:nm[2])+"</li>";
      }else{closeTo(0);if(line.trim())html+='<div class="ln">'+mdInline(line)+"</div>";}
    }
    closeTo(0);return html;
  }
  var JR_COMPANY="빗썸",JR_APP="https://jobrecon.100m1s.com";
  var report=document.getElementById("report");
  if(!report)return;
  var digBtn=document.createElement("button");
  digBtn.id="digBtn";digBtn.textContent="🔎 더 파고들기";
  document.body.appendChild(digBtn);
  var _digSel=null;
  function clearDig(){digBtn.style.display="none";}
  function topBlock(node){
    var el=node&&node.nodeType===1?node:(node?node.parentElement:null);
    while(el&&el.parentElement&&el.parentElement!==report)el=el.parentElement;
    return (el&&el.parentElement===report)?el:null;
  }
  function checkSelection(){
    var s=window.getSelection();
    var text=(s&&s.toString?s.toString():"").trim();
    if(!text||text.length<2||!s.rangeCount){clearDig();return;}
    var range=s.getRangeAt(0);
    var blockEl=topBlock(range.commonAncestorContainer);
    if(!blockEl){clearDig();return;}
    _digSel={text:text.slice(0,600),blockEl:blockEl};
    var rects=range.getClientRects();
    var r=rects.length?rects[rects.length-1]:range.getBoundingClientRect();
    digBtn.style.display="block";
    var w=digBtn.offsetWidth||132,vw=document.documentElement.clientWidth;
    var left=window.scrollX+r.left+r.width/2-w/2;
    left=Math.max(8,Math.min(left,window.scrollX+vw-w-8));
    digBtn.style.left=left+"px";digBtn.style.top=(window.scrollY+r.bottom+10)+"px";
  }
  var _selDebounce=null;
  function scheduleCheck(delay){clearTimeout(_selDebounce);_selDebounce=setTimeout(checkSelection,delay);}
  document.addEventListener("selectionchange",function(){scheduleCheck(320);});
  document.addEventListener("mouseup",function(){scheduleCheck(10);});
  document.addEventListener("touchend",function(){scheduleCheck(140);});
  digBtn.addEventListener("mousedown",function(e){e.preventDefault();});
  var _digLast=0;
  function runDig(e){
    if(e){e.preventDefault();e.stopPropagation();}
    if(Date.now()-_digLast<800)return;
    _digLast=Date.now();
    if(!_digSel)return;
    var sel=_digSel,blockEl=sel.blockEl;
    clearDig();
    try{window.getSelection().removeAllRanges();}catch(x){}
    var _dk="jr_dig_r_"+location.pathname; var used=parseInt(localStorage.getItem(_dk)||"0",10);
    if(used>=3){
      var note=document.createElement("div");note.className="comment";
      note.innerHTML='<span class="cx">✕</span><div class="cbody">더 깊은 분석과 내 이력 기준 적합도는 앱에서 이어가세요 →<br><a class="cta-app" href="'+esc(JR_APP)+'">JobRecon 앱에서 계속하기 →</a></div>';
      blockEl.insertAdjacentElement("afterend",note);
      note.querySelector(".cx").addEventListener("click",function(){note.remove();});
      note.scrollIntoView({behavior:"smooth",block:"center"});return;
    }
    localStorage.setItem(_dk,String(used+1));
    var card=document.createElement("div");card.className="comment";
    card.innerHTML='<span class="cx">✕</span><div class="cq"><b>선택</b> “'+esc(sel.text)+'”</div><div class="cbody">더 깊이 분석 중…</div>';
    blockEl.insertAdjacentElement("afterend",card);
    card.querySelector(".cx").addEventListener("click",function(){card.remove();});
    card.scrollIntoView({behavior:"smooth",block:"center"});
    var bodyEl=card.querySelector(".cbody");
    var context=(blockEl.textContent||"").slice(0,2000);
    ensureAPI().then(function(){
      return fetch(API+"/expand",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({selected:sel.text,context:context,company:JR_COMPANY})});
    }).then(function(res){
      if(!res.ok||!res.body)throw new Error("연결 실패");
      var reader=res.body.getReader(),dec=new TextDecoder(),buf="",full="";
      function pump(){
        return reader.read().then(function(r){
          if(r.done){if(!full)bodyEl.innerHTML='<span class="err">응답이 지연됩니다 — 다시 시도해 주세요.</span>';return;}
          buf+=dec.decode(r.value,{stream:true});
          var sep;
          while((sep=buf.indexOf("\n\n"))!==-1){
            var line=buf.slice(0,sep);buf=buf.slice(sep+2);
            if(line.indexOf("data: ")!==0)continue;
            var ev;try{ev=JSON.parse(line.slice(6));}catch(x){continue;}
            if(ev.error){bodyEl.innerHTML='<span class="err">'+esc(ev.error)+'</span>';return;}
            if(ev.status&&!full)bodyEl.textContent=ev.status;
            if(ev.t){full+=ev.t;bodyEl.innerHTML=renderMd(full);}
            if(ev.done)return;
          }
          return pump();
        });
      }
      return pump();
    }).catch(function(){bodyEl.innerHTML='<span class="err">추가 분석 실패 — 다시 시도해 주세요.</span>';});
  }
  digBtn.addEventListener("click",runDig);
  digBtn.addEventListener("touchend",runDig);
})();
</script>
