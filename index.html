<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JobRecon — 구직자 편 취업 정찰</title>
<style>
  :root {
    --bg:#0f1216; --card:#171b22; --card2:#1e232c; --line:#2a313c;
    --fg:#e8ecf1; --dim:#9aa6b2; --accent:#4f8cff;
    --yes:#31c48d; --cond:#f6a609; --no:#8b95a1; --hold:#8b95a1;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",Segoe UI,Roboto,sans-serif;
    line-height:1.6; }
  .wrap { max-width:820px; margin:0 auto; padding:16px; }
  header { padding:8px 2px 4px; }
  .brand { font-size:20px; font-weight:800; letter-spacing:-.3px; }
  .brand span { color:var(--accent); }
  .tag { color:var(--dim); font-size:13px; margin-top:2px; }

  .ad { margin:14px 0; border:1px dashed var(--line); border-radius:12px;
    background:linear-gradient(180deg,#141922,#12161d); color:var(--dim);
    text-align:center; padding:14px; font-size:12px; letter-spacing:.4px; }
  .ad b { color:#c3ccd6; }
  /* 앵커: 광고+정찰대상(회사·직군)을 스크롤 중에도 고정. 토글로 해제 */
  .anchor { background:var(--bg); }
  .anchor.pinned { position:sticky; top:0; z-index:50; margin:0 -4px; padding:6px 4px 4px;
    border-bottom:1px solid var(--line); box-shadow:0 6px 14px -8px rgba(0,0,0,.6); }
  .anchor.pinned .ad { margin:8px 0 4px; padding:9px; }   /* 고정 시 광고 슬림 */
  .ad-infeed { margin:12px 0; }                            /* 리포트 인피드 광고(트랙 B-1) */
  /* 복귀 완료 게이트(트랙 B-2) — 이탈 후 돌아온 사용자에게 광고 1회 후 리포트 공개 */
  .gate { position:fixed; inset:0; z-index:100; background:rgba(6,9,13,.93);
    display:none; align-items:center; justify-content:center; padding:20px; }
  .gate.on { display:flex; }
  .gate .gcard { background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:22px 18px; max-width:420px; width:100%; text-align:center;
    box-shadow:0 20px 50px -12px rgba(0,0,0,.7); }
  .gate .gtitle { font-size:16px; font-weight:800; }
  .gate .gsub { font-size:13px; color:var(--dim); margin:4px 0 14px; }
  .anchor-row { display:flex; align-items:center; gap:8px; }
  .anchor-row #meta { flex:1; margin:0; }
  .pin { width:auto; margin:0; padding:5px 10px; font-size:11.5px; font-weight:700;
    background:var(--card2); color:var(--dim); border:1px solid var(--line); border-radius:999px;
    white-space:nowrap; cursor:pointer; flex:0 0 auto; }
  .pin.on { background:var(--accent); color:#fff; border-color:var(--accent); }

  .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px; margin:12px 0; }
  label { display:block; font-size:13px; color:var(--dim); margin:8px 0 4px; }
  input[type=url], textarea { width:100%; background:var(--card2); color:var(--fg);
    border:1px solid var(--line); border-radius:10px; padding:11px 12px; font-size:15px; }
  textarea { min-height:74px; resize:vertical; }
  button { width:100%; margin-top:12px; background:var(--accent); color:#fff; border:0;
    border-radius:10px; padding:13px; font-size:16px; font-weight:700; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  button.secondary { background:var(--card2); color:var(--fg); border:1px solid var(--line); margin-top:10px; }
  #compare .row { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--card); border:1px solid var(--line); border-radius:10px; margin:6px 0; }
  #compare .mini { font-size:11px; font-weight:800; padding:3px 8px; border-radius:999px; color:#08110c; white-space:nowrap; }
  #compare .mini.YES{background:var(--yes)} #compare .mini.조건부{background:var(--cond)}
  #compare .mini.NO{background:var(--no);color:#fff} #compare .mini.판단보류{background:var(--hold);color:#fff}
  #compare a { color:var(--fg); text-decoration:none; font-size:14px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #compare a:hover { color:var(--accent); }

  .constraints { margin-top:10px; padding:10px 12px; background:var(--card2); border:1px solid var(--line); border-radius:10px; }
  .crow { display:flex; gap:18px; flex-wrap:wrap; margin-bottom:8px; }
  .ck { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--fg); margin:0; cursor:pointer; }
  .ck input { width:16px; height:16px; accent-color:var(--accent); }
  .constraints input[type=number] { width:100%; background:var(--bg); color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:9px 10px; font-size:14px; }
  .clabel { font-size:12px; color:var(--dim); margin:2px 0 4px; }

  .verdict { display:none; align-items:center; gap:10px; margin:12px 0; }
  .badge { font-weight:800; font-size:14px; padding:6px 12px; border-radius:999px; color:#08110c; }
  .badge.YES{background:var(--yes)} .badge.조건부{background:var(--cond)}
  .badge.NO{background:var(--no);color:#fff} .badge.판단보류{background:var(--hold);color:#fff}
  .verdict .vt { color:var(--dim); font-size:13px; }

  .blocks .blk { background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; margin:10px 0; }
  .blk h3 { margin:0 0 6px; font-size:15px; }
  .blk .body { font-size:14.5px; color:#dbe2ea; }
  .blk .body ul, .blk .body ol { margin:6px 0; padding-left:20px; }
  .blk .body ul ul, .blk .body ul ol, .blk .body ol ul, .blk .body ol ol { margin:2px 0; }
  .blk .body li { margin:3px 0; }
  .blk .body code { background:#0f1319; border:1px solid var(--line); border-radius:5px;
    padding:1px 5px; font-size:12.5px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  /* 텍스트 선택 → 추가분석 코멘트 */
  #digBtn { position:absolute; display:none; z-index:60; width:auto; margin:0; padding:7px 13px;
    font-size:13px; font-weight:700; border-radius:999px; background:var(--accent); color:#fff;
    box-shadow:0 5px 16px -3px rgba(0,0,0,.6); cursor:pointer; white-space:nowrap; }
  .comment { margin:8px 0 12px; border-left:3px solid var(--accent); background:#141a24;
    border-radius:0 10px 10px 0; padding:10px 12px; }
  .comment .cq { font-size:12px; color:var(--dim); margin-bottom:7px; padding-bottom:7px;
    border-bottom:1px dashed var(--line); }
  .comment .cq b { color:var(--accent); font-weight:700; }
  .comment .cx { float:right; cursor:pointer; color:var(--dim); font-size:13px; margin-left:8px; }
  .comment .cbody { font-size:14px; color:#dbe2ea; }
  .blk .body .ln { margin:5px 0; }
  .blk .body strong { color:#f0f4f8; font-weight:700; }
  #meta { display:none; margin:12px 0 2px; font-size:15px; color:#e2e8ef; font-weight:600; }
  #meta .chip { font-size:11px; font-weight:800; background:var(--accent); color:#fff; padding:3px 9px; border-radius:999px; margin-right:8px; vertical-align:middle; }
  .status { color:var(--dim); font-size:13px; min-height:18px; padding:2px; }
  .err { color:#ff6b6b; }
  .cursor::after { content:"▋"; color:var(--accent); animation:blink 1s steps(1) infinite; }
  @keyframes blink { 50%{opacity:0} }
  .foot { color:var(--dim); font-size:11px; text-align:center; margin:18px 0 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Job<span>Recon</span></div>
    <div class="tag">구직자 편 취업 정찰 · 공고 URL 하나로 "지원할 가치가 있나"를 답합니다</div>
  </header>

  <!-- 알림 배너 슬롯: 평소 숨김, 실 운영 알림 시에만 노출. 개발용 문구는 라이브에 싣지 않음 -->
  <div id="notice" style="display:none; margin:12px 0; padding:10px 12px; border:1px solid var(--line); border-radius:10px; background:var(--card2); color:var(--dim); font-size:13px; line-height:1.5"></div>

  <!-- 앵커(FR-009·FR-029): 광고 + 정찰대상(회사·직군)을 스크롤 중에도 상단 고정. 📌 토글로 해제 -->
  <div class="anchor pinned" id="anchor">
    <div class="anchor-row">
      <div id="meta"></div>
      <button id="pinToggle" class="pin on" type="button" title="스크롤 시 상단 고정/해제">📌 고정</button>
    </div>
    <div class="ad" id="ad"><b>AD</b> · 광고 지면 (정찰 리포트를 기다리는 동안 노출됩니다)</div>
  </div>

  <div class="card">
    <label for="url">채용공고 URL</label>
    <input id="url" type="url" placeholder="채용 공고 링크 — 원티드·링크드인·사람인·잡코리아·회사 채용페이지 등 어디든" />
    <label for="profile">내 경력 요약 (선택 — 입력하면 적합도까지 분석)</label>
    <textarea id="profile" placeholder="예) 7년차 백엔드 개발자 · Java/Spring/Kafka · 커머스 도메인 (또는 마케터·PM·디자이너 등 무엇이든)"></textarea>

    <div class="constraints">
      <div class="clabel">내 조건 (평결에 반영·저장됩니다)</div>
      <div class="crow">
        <label class="ck"><input type="checkbox" id="c_eng"> 영어 인터뷰 불가</label>
        <label class="ck"><input type="checkbox" id="c_coding"> 코딩테스트 회피</label>
      </div>
      <input id="c_tc" type="number" inputmode="numeric" placeholder="목표 연봉 TC (세전·만원, 선택) — 예) 8000" />
    </div>

    <button id="go">정찰 시작</button>
  </div>

  <div class="status" id="status"></div>

  <div class="verdict" id="verdict">
    <span class="badge" id="badge"></span>
    <span class="vt">지원가치 평결</span>
  </div>

  <div class="blocks" id="blocks"></div>

  <!-- 트랙 B-2: 이탈 후 복귀 사용자 완료 게이트(광고 1회 후 리포트 공개) -->
  <div class="gate" id="doneGate">
    <div class="gcard">
      <div class="gtitle">정찰 완료 — 리포트가 준비됐어요</div>
      <div class="gsub">자리를 비운 사이 정찰이 끝났습니다. 아래에서 리포트를 확인하세요.</div>
      <div class="ad ad-infeed" id="gateAd"><b>AD</b> · 광고</div>
      <button id="gateBtn">리포트 보기</button>
    </div>
  </div>

  <button id="resumeBtn" class="secondary" style="display:none">이 공고용 이력서 초안 만들기</button>
  <div class="blocks" id="resume"></div>

  <div id="compareWrap" style="display:none">
    <div class="clabel" style="margin-top:22px; font-size:13px;">비교 · 내가 정찰한 공고 (평결순)</div>
    <div id="compare"></div>
    <button id="compareBtn" class="secondary" style="display:none; margin-top:12px">⚖️ 내 기준으로 비교 인사이트 보기</button>
    <div class="blocks" id="compareInsight"></div>
  </div>

  <div class="foot">v0 프로토타입 · 기업 코멘트는 DART 공시·LLM 기반 · 근거 없는 단정 없이 "확인 필요"로 안내합니다 · <a href="./privacy.html" style="color:var(--dim)">개인정보처리방침</a></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
// 백엔드 API 주소: 같은 서버면 "" (상대경로). GitHub Pages 등 분리 배포 시
// window.JOBRECON_API = "https://api.jobrecon.100m1s.com" 로 지정.
// 백엔드 주소: window.JOBRECON_API(하드코딩) 우선, 없으면 api.txt(터널 URL 자동발행)에서 로드.
// → 터널 재시작으로 URL이 바뀌어도 프론트가 자동으로 따라감(상시 운영 자가치유).
let API = (window.JOBRECON_API || "").replace(/\/+$/, "");
async function ensureAPI() {
  if (API) return API;
  try {
    const r = await fetch("./api.txt", { cache: "no-store" });
    if (r.ok) API = (await r.text()).trim().replace(/\/+$/, "");
  } catch (e) { /* api.txt 없으면 상대경로(빈 문자열) 유지 */ }
  return API;
}
ensureAPI();
// 백엔드 접근 토큰(설정 시 요청 헤더에 포함) — 공개 배포 시 무단 호출 억제용
function authHeaders() {
  const h = { "Content-Type": "application/json" };
  if (window.JOBRECON_TOKEN) h["X-JobRecon-Token"] = window.JOBRECON_TOKEN;
  return h;
}
const go = $("go"), statusEl = $("status"), blocksEl = $("blocks"),
      verdictEl = $("verdict"), badgeEl = $("badge"),
      resumeBtn = $("resumeBtn"), resumeEl = $("resume"),
      compareWrap = $("compareWrap"), compareEl = $("compare"), metaEl = $("meta"),
      anchorEl = $("anchor"), pinToggle = $("pinToggle"),
      compareBtn = $("compareBtn"), compareInsight = $("compareInsight");
let lastJob = null, lastProfile = null;

// 앵커 고정/해제 토글(광고+정찰대상 상단 고정). 기본 고정, 선택은 localStorage 유지.
function applyPin(pinned) {
  anchorEl.classList.toggle("pinned", pinned);
  pinToggle.classList.toggle("on", pinned);
  pinToggle.textContent = pinned ? "📌 고정" : "📌 고정 해제됨";
}
applyPin(localStorage.getItem("jr_pin") !== "0");
pinToggle.addEventListener("click", () => {
  const pinned = !anchorEl.classList.contains("pinned");
  localStorage.setItem("jr_pin", pinned ? "1" : "0");
  applyPin(pinned);
});

const TITLES = {1:"지원 판단", 2:"공고 핵심 요건", 3:"회사 서사·궤적", 4:"실체 점검·리스크", 6:"경영진·투자자 정렬", 5:"나와의 적합 & 면접·협상", 7:"용어·개념 풀이"};
// 표시 순서(내부 id와 무관): 판단→요건→서사→실체점검→경영진→적합→용어풀이(참고)
const BLOCK_ORDER = {1:0, 2:1, 3:2, 4:3, 6:4, 5:5, 7:6};

// 경량 마크다운 렌더(이스케이프 후 안전한 인라인/불릿만) — **굵게**, - 불릿, 문단
// 마크다운 렌더 — bold·inline code·중첩 불릿(들여쓰기)·번호 리스트 지원
function mdInline(s) {
  return s
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}
function renderMd(t) {
  const lines = esc(t).split("\n");
  let html = "", stack = [];  // 열린 리스트: {depth, tag}
  const closeTo = (d) => { while (stack.length > d) html += "</" + stack.pop().tag + ">"; };
  for (const raw of lines) {
    const line = raw.replace(/\s+$/, "");
    const bm = line.match(/^(\s*)[-•]\s+(.*)$/);       // 불릿
    const nm = line.match(/^(\s*)\d+\.\s+(.*)$/);       // 번호
    if (bm || nm) {
      const indent = (bm ? bm[1] : nm[1]).replace(/\t/g, "  ").length;
      const depth = indent >= 4 ? 3 : (indent >= 2 ? 2 : 1);
      const tag = nm ? "ol" : "ul";
      closeTo(depth);
      if (stack.length < depth) { html += "<" + tag + ">"; stack.push({depth, tag}); }
      html += "<li>" + mdInline(bm ? bm[2] : nm[2]) + "</li>";
    } else {
      closeTo(0);
      if (line.trim()) html += '<div class="ln">' + mdInline(line) + "</div>";
    }
  }
  closeTo(0);
  return html;
}
function renderMeta(m) {
  const parts = [m && m.company, m && m.position].filter(Boolean);
  if (!parts.length) return;
  metaEl.innerHTML = '<span class="chip">🎯 정찰 대상</span>' + esc(parts.join(" · "));
  metaEl.style.display = "block";
}

function renderBlocks(text) {
  // "## 1." ~ "## 4." 헤더로 분리(텍스트 순서로 슬라이스)
  const re = /^##\s*(\d)\.\s*(.*)$/gm;
  let m, marks = [];
  while ((m = re.exec(text)) !== null) marks.push({id:+m[1], idx:m.index, end:re.lastIndex});
  if (marks.length === 0) {
    blocksEl.innerHTML = `<div class="blk"><div class="body cursor">${esc(text)}</div></div>`;
    return;
  }
  const lastId = marks[marks.length - 1].id;  // 현재 스트리밍 중인 블록(커서)
  let blocks = marks.map((mk, i) => ({
    id: mk.id,
    body: text.slice(mk.end, i+1 < marks.length ? marks[i+1].idx : text.length).trim(),
  }));
  // tier1/tier2가 순서 뒤섞여 도착해도 정해진 표시 순서로 렌더(판단→요건→리스크→실제조건→경영진→적합)
  blocks.sort((a, b) => (BLOCK_ORDER[a.id] ?? 99) - (BLOCK_ORDER[b.id] ?? 99));
  // 트랙 B-1: 리포트 인피드 광고 — 1번째 블록 뒤(상단) + 중간. 이탈·복귀 사용자도 결과와 함께 노출.
  const mid = blocks.length >= 5 ? 3 : (blocks.length >= 3 ? 1 : -1);
  let out = "";
  blocks.forEach((b, i) => {
    out += `<div class="blk"><h3>${i+1}. ${esc(TITLES[b.id]||"")}</h3>`
      + `<div class="body${b.id===lastId?" cursor":""}">${renderMd(b.body)}</div></div>`;
    if (i === 0) out += '<div class="ad ad-infeed" id="adFeed1"><b>AD</b> · 광고</div>';
    if (i === mid) out += '<div class="ad ad-infeed" id="adFeed2"><b>AD</b> · 광고</div>';
  });
  blocksEl.innerHTML = out;
  updateVerdict(text);
}

function updateVerdict(text) {
  const m = text.match(/\[(YES|조건부|NO)\]/);
  const level = m ? m[1] : null;
  if (level) {
    verdictEl.style.display = "flex";
    badgeEl.className = "badge " + level;
    badgeEl.textContent = level === "YES" ? "지원 추천" : level === "조건부" ? "조건부" : "지원 비추천";
  }
}
function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
// 공유 텍스트 붙여넣기 대응 — "…지원해 보세요. http://wntd.co/xxx" 에서 URL만 발라냄
function extractUrl(t){ const m=(t||"").match(/https?:\/\/[^\s<>"')]+/); return m ? m[0].replace(/[.,)\]}]+$/,"") : (t||"").trim(); }

// 🔴 정찰은 서버 백그라운드 job + 폴링(스트리밍 아님). 모바일에서 앱 전환/새로고침/탭 종료
// 후 복귀해도 정찰이 유실되지 않는다(job은 서버에서 계속, 돌아오면 이어받음). FR-037.
const JOB_KEY = "jr_active_job";
let _pollTimer = null, _pollFull = "";
let _leftDuringJob = false;  // 정찰 중 이탈(백그라운드·새로고침·복귀) 여부 → 완료 게이트 판단
function stopPoll() { if (_pollTimer) { clearTimeout(_pollTimer); _pollTimer = null; } }

async function analyze() {
  const job_url = extractUrl($("url").value);  // 공유 텍스트 붙여넣기 → URL만 발라냄
  const profile = $("profile").value.trim();
  if (!job_url) { statusEl.innerHTML = '<span class="err">공고 링크를 입력해 주세요.</span>'; return; }
  await ensureAPI();  // 백엔드 주소 확정(api.txt 자동발행 대응)
  const constraints = readConstraints();
  saveProfile(profile, constraints);  // 내 정보·조건 저장(다음 방문 자동 복원)
  go.disabled = true; blocksEl.innerHTML = ""; verdictEl.style.display = "none";
  metaEl.style.display = "none"; metaEl.innerHTML = "";
  resumeBtn.style.display = "none"; resumeEl.innerHTML = "";
  lastJob = job_url; lastProfile = profile;
  _leftDuringJob = false; _adsFinalized = false; hideDoneGate();
  statusEl.textContent = "정찰을 시작하는 중…";
  try {
    const res = await fetch(API + "/analyze/start", {
      method:"POST", headers: authHeaders(),
      body: JSON.stringify({ job_url, profile: profile || null, constraints, user_id: getUid() })
    });
    if (!res.ok) throw new Error("백엔드에 연결할 수 없습니다 — 백엔드 연결이 필요합니다.");
    const data = await res.json();
    if (data.error) { statusEl.innerHTML = `<span class="err">${esc(data.error)}</span>`; go.disabled=false; return; }
    // job_id 저장 → 앱 전환·새로고침·탭 종료 후 복귀해도 이어받음
    localStorage.setItem(JOB_KEY, JSON.stringify({ job_id: data.job_id, job_url, ts: Date.now() }));
    pollJob(data.job_id);
  } catch (e) {
    statusEl.innerHTML = `<span class="err">오류: ${esc(String(e.message||e))}</span>`;
    go.disabled = false;
  }
}

// 서버 job 상태를 2초마다 조회 — 연결이 아니라 상태를 폴링하므로 모바일 백그라운드를 견딘다
function pollJob(job_id) {
  stopPoll(); _pollFull = "";
  function endPoll() { stopPoll(); localStorage.removeItem(JOB_KEY); go.disabled = false; }
  const tick = async () => {
    let ev;
    try {
      const r = await fetch(API + "/analyze/poll/" + job_id, { cache:"no-store" });
      ev = await r.json();
    } catch (e) {
      _pollTimer = setTimeout(tick, 2500); return;  // 일시 실패(백그라운드 등) → 중단 말고 재시도
    }
    if (ev.error === "unknown_job") {
      statusEl.innerHTML = '<span class="err">정찰 결과가 만료됐습니다 — 다시 정찰해 주세요.</span>';
      endPoll(); return;
    }
    if (ev.meta) renderMeta(ev.meta);
    if (typeof ev.text === "string" && ev.text !== _pollFull) { _pollFull = ev.text; renderBlocks(_pollFull); }
    if (ev.error) { statusEl.innerHTML = `<span class="err">${esc(ev.error)}</span>`; endPoll(); return; }
    if (ev.status) statusEl.textContent = ev.status;
    if (ev.done) {
      statusEl.textContent = _pollFull ? "정찰 완료." : "정찰이 종료됐습니다.";
      if (_pollFull && lastProfile) resumeBtn.style.display = "block";
      if (_pollFull) finalizeAds();                      // 트랙 B-1: 리포트 인피드 광고 활성화(AdSense 설정 시)
      if (_pollFull && _leftDuringJob) showDoneGate();   // 트랙 B-2: 이탈 후 복귀 → 완료 광고 게이트
      loadCompare(); endPoll(); return;
    }
    _pollTimer = setTimeout(tick, 2000);
  };
  tick();
}

// 페이지 로드/복귀 시 진행 중이던 정찰 이어받기(앱 전환·새로고침·탭 종료 대응)
function resumeActiveJob() {
  if (_pollTimer) return;  // 이미 폴링 중이면 스킵
  let saved; try { saved = JSON.parse(localStorage.getItem(JOB_KEY) || "null"); } catch (e) { saved = null; }
  if (!saved || !saved.job_id) return;
  if (Date.now() - (saved.ts || 0) > 20*60*1000) { localStorage.removeItem(JOB_KEY); return; }
  if (saved.job_url) $("url").value = saved.job_url;
  _leftDuringJob = true;  // 새 로드로 이어받음 = 자리를 비웠던 것 → 완료 시 게이트(트랙 B-2)
  go.disabled = true;
  statusEl.textContent = "진행 중이던 정찰을 이어받는 중…";
  pollJob(saved.job_id);
}
// 탭 가시성: 정찰 중 숨겨지면 이탈 표시, 돌아오면 이어받기
document.addEventListener("visibilitychange", () => {
  if (document.hidden) { if (_pollTimer) _leftDuringJob = true; }
  else { resumeActiveJob(); }
});

// 트랙 B-2: 완료 게이트(이탈 후 복귀 사용자에게 광고 1회 후 리포트)
function showDoneGate() { const g = $("doneGate"); if (g) { activateAd("gateAd"); g.classList.add("on"); } }
function hideDoneGate() { const g = $("doneGate"); if (g) g.classList.remove("on"); const ga=$("gateAd"); if (ga) delete ga.dataset.done; }
$("gateBtn").addEventListener("click", () => { hideDoneGate(); blocksEl.scrollIntoView({behavior:"smooth", block:"start"}); });

// 트랙 B-1/B-2: AdSense 슬롯 활성화 — window.JOBRECON_ADSENSE_CLIENT 설정 시 placeholder→실제 광고. 미설정 시 placeholder 유지.
let _adsFinalized = false;
function activateAd(id) {
  const client = window.JOBRECON_ADSENSE_CLIENT, slot = window.JOBRECON_ADSENSE_SLOT_INFEED;
  const el = $(id);
  if (!client || !el || el.dataset.done) return;
  el.dataset.done = "1";
  el.innerHTML = '<ins class="adsbygoogle" style="display:block" data-ad-client="' + client + '"'
    + (slot ? ' data-ad-slot="' + slot + '"' : "") + ' data-ad-format="fluid" data-full-width-responsive="true"></ins>';
  try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
}
function finalizeAds() { if (_adsFinalized) return; _adsFinalized = true; activateAd("adFeed1"); activateAd("adFeed2"); }

// --- 텍스트 선택 → 추가 분석(빠른 즉답). 리포트 본체와 별개 ---
const digBtn = document.createElement("button");
digBtn.id = "digBtn"; digBtn.textContent = "🔍 더 파고들기";
document.body.appendChild(digBtn);
let _digSel = null;  // { text, blockEl }
function clearDig() { digBtn.style.display = "none"; }
function onSelChange() {
  const s = window.getSelection();
  const text = (s && s.toString ? s.toString() : "").trim();
  if (!text || text.length < 2 || !s.rangeCount) { clearDig(); return; }
  const range = s.getRangeAt(0);
  const node = range.commonAncestorContainer;
  const anchor = node.nodeType === 1 ? node : node.parentElement;
  const blockEl = anchor && anchor.closest ? anchor.closest("#blocks .blk") : null;
  if (!blockEl) { clearDig(); return; }  // 리포트 블록 안에서 선택한 것만
  _digSel = { text: text.slice(0, 600), blockEl };
  const r = range.getBoundingClientRect();
  digBtn.style.display = "block";
  const w = digBtn.offsetWidth || 120;
  let left = window.scrollX + r.left + r.width / 2 - w / 2;
  left = Math.max(8, Math.min(left, window.scrollX + document.documentElement.clientWidth - w - 8));
  digBtn.style.left = left + "px";
  digBtn.style.top = Math.max(8, window.scrollY + r.top - 44) + "px";
}
document.addEventListener("mouseup", () => setTimeout(onSelChange, 10));
document.addEventListener("touchend", () => setTimeout(onSelChange, 10));
document.addEventListener("scroll", clearDig, { passive: true });

digBtn.addEventListener("mousedown", (e) => e.preventDefault());  // 선택 유지
digBtn.addEventListener("click", async (e) => {
  e.preventDefault(); e.stopPropagation();
  if (!_digSel) return;
  const sel = _digSel, blockEl = sel.blockEl;
  clearDig();
  try { window.getSelection().removeAllRanges(); } catch (x) {}
  // 코멘트 카드 삽입(선택 블록 바로 아래)
  const card = document.createElement("div");
  card.className = "comment";
  card.innerHTML = '<span class="cx">✕</span><div class="cq"><b>선택</b> “' + esc(sel.text) + '”</div>'
    + '<div class="cbody">더 깊이 분석 중…</div>';
  blockEl.insertAdjacentElement("afterend", card);
  card.querySelector(".cx").addEventListener("click", () => card.remove());
  card.scrollIntoView({ behavior: "smooth", block: "center" });
  const bodyEl = card.querySelector(".cbody");
  const context = (blockEl.textContent || "").slice(0, 2000);
  const company = (metaEl.textContent || "").replace("🎯 정찰 대상", "").trim();
  try {
    await ensureAPI();
    const res = await fetch(API + "/expand", {
      method: "POST", headers: authHeaders(),
      body: JSON.stringify({ selected: sel.text, context, company })
    });
    if (!res.ok || !res.body) throw new Error("연결 실패");
    const reader = res.body.getReader(), dec = new TextDecoder();
    let buf = "", full = "";
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let sep;
      while ((sep = buf.indexOf("\n\n")) !== -1) {
        const line = buf.slice(0, sep); buf = buf.slice(sep + 2);
        if (!line.startsWith("data: ")) continue;
        let ev; try { ev = JSON.parse(line.slice(6)); } catch { continue; }
        if (ev.error) { bodyEl.innerHTML = '<span class="err">' + esc(ev.error) + '</span>'; return; }
        if (ev.status && !full) bodyEl.textContent = ev.status;
        if (ev.t) { full += ev.t; bodyEl.innerHTML = renderMd(full); }
        if (ev.done) return;
      }
    }
    if (!full) bodyEl.innerHTML = '<span class="err">응답이 지연됩니다 — 다시 시도해 주세요.</span>';
  } catch (err) {
    bodyEl.innerHTML = '<span class="err">추가 분석 실패 — 다시 시도해 주세요.</span>';
  }
});
// --- 사용자 정보 저장/복원(US6): 익명 로컬 id ---
const UID_KEY = "jobrecon_uid";
function getUid() {
  let u = localStorage.getItem(UID_KEY);
  if (!u) { u = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
                : (""+Date.now()+Math.random().toString(16).slice(2));
            localStorage.setItem(UID_KEY, u); }
  return u;
}
function readConstraints() {
  const tcMan = parseInt($("c_tc").value, 10);
  return {
    english_interview_ok: !$("c_eng").checked,   // 체크 = 영어 불가
    avoid_coding_test: $("c_coding").checked,
    target_tc: Number.isFinite(tcMan) ? tcMan * 10000 : null,  // 만원 → 원
  };
}
async function loadProfile() {
  try { const r = await fetch(API + "/profile/" + encodeURIComponent(getUid()));
        const b = await r.json();
        if (b && b.profile && !$("profile").value) $("profile").value = b.profile;
        const c = b && b.constraints;
        if (c) {
          if (typeof c.english_interview_ok === "boolean") $("c_eng").checked = !c.english_interview_ok;
          if (c.avoid_coding_test) $("c_coding").checked = true;
          if (c.target_tc) $("c_tc").value = Math.round(c.target_tc / 10000);
        }
  } catch (e) {}
}
async function saveProfile(profile, constraints) {
  try { await fetch(API + "/profile", { method:"POST", headers: authHeaders(),
        body: JSON.stringify({ id: getUid(), profile: (profile || $("profile").value.trim()) || null,
                               constraints: constraints || readConstraints() }) });
  } catch (e) {}
}
const CMP_LABEL = { "YES":"추천", "조건부":"조건부", "NO":"비추천", "판단보류":"보류" };
async function loadCompare() {
  try {
    const r = await fetch(API + "/saved/" + encodeURIComponent(getUid()));
    const b = await r.json();
    const items = (b && b.items) || [];
    if (!items.length) { compareWrap.style.display = "none"; return; }
    compareEl.innerHTML = items.map(it => {
      const lv = it.verdict_level || "판단보류";
      const title = esc([it.company, it.position].filter(Boolean).join(" · ") || it.job_url);
      return `<div class="row"><span class="mini ${lv}">${esc(CMP_LABEL[lv] || lv)}</span>`
           + `<a href="${esc(it.job_url)}" target="_blank" rel="noopener">${title}</a></div>`;
    }).join("");
    compareWrap.style.display = "block";
    compareBtn.style.display = items.length >= 2 ? "block" : "none";  // 2개+면 비교 인사이트 가능
  } catch (e) {}
}

// 개인 결정 축 기반 비교 인사이트(히츠 vs 윌로그式) — /compare SSE 스트림 렌더
async function runCompare() {
  await ensureAPI();
  compareBtn.disabled = true;
  compareInsight.innerHTML = '<div class="blk"><div class="body cursor">내 기준으로 회사들을 저울질하는 중…</div></div>';
  let full = "", buf = "";
  try {
    const res = await fetch(API + "/compare/" + encodeURIComponent(getUid()), { headers: authHeaders() });
    const reader = res.body.getReader(); const dec = new TextDecoder();
    for (;;) {
      const { value, done } = await reader.read(); if (done) break;
      buf += dec.decode(value, { stream: true });
      let i;
      while ((i = buf.indexOf("\n")) >= 0) {
        const line = buf.slice(0, i); buf = buf.slice(i + 1);
        if (!line.startsWith("data:")) continue;
        let ev; try { ev = JSON.parse(line.slice(5).trim()); } catch (e) { continue; }
        if (ev.error) { compareInsight.innerHTML = '<div class="blk"><div class="body"><span class="err">' + esc(ev.error) + '</span></div></div>'; compareBtn.disabled = false; return; }
        if (ev.done) { compareBtn.disabled = false; compareBtn.style.display = "none"; break; }
        if (ev.t) { full += ev.t; compareInsight.innerHTML = '<div class="blk"><h3>⚖️ 내 기준 비교 인사이트</h3><div class="body cursor">' + renderMd(full) + '</div></div>'; }
      }
    }
  } catch (e) { compareInsight.innerHTML = '<div class="blk"><div class="body"><span class="err">비교를 불러오지 못했습니다.</span></div></div>'; compareBtn.disabled = false; }
}
compareBtn.addEventListener("click", runCompare);
// --- 광고: Google AdSense (게시자 ID 설정 시 실제 광고, 없으면 placeholder 유지) ---
// GitHub Pages 등에 window.JOBRECON_ADSENSE_CLIENT="ca-pub-XXXX" (+ _SLOT) 지정하면 활성화.
function initAds() {
  const client = window.JOBRECON_ADSENSE_CLIENT, slot = window.JOBRECON_ADSENSE_SLOT;
  if (!client) return;
  const s = document.createElement("script");
  s.async = true; s.crossOrigin = "anonymous";
  s.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=" + encodeURIComponent(client);
  document.head.appendChild(s);
  $("ad").innerHTML = '<ins class="adsbygoogle" style="display:block" data-ad-client="' + client + '"'
    + (slot ? ' data-ad-slot="' + slot + '"' : "") + ' data-ad-format="auto" data-full-width-responsive="true"></ins>';
  try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
}
window.addEventListener("DOMContentLoaded", async () => { await ensureAPI(); loadProfile(); loadCompare(); initAds(); resumeActiveJob(); });

// --- US5: 이 공고용 이력서 초안 ---
async function streamResume() {
  if (!lastJob || !lastProfile) return;
  resumeBtn.disabled = true;
  resumeEl.innerHTML = '<div class="blk"><h3>이력서 초안</h3><div class="body cursor"></div></div>';
  const bodyEl = resumeEl.querySelector(".body");
  let buf = "", full = "";
  try {
    const res = await fetch(API + "/resume", { method:"POST", headers: authHeaders(),
      body: JSON.stringify({ job_url: lastJob, profile: lastProfile }) });
    if (!res.ok || !res.body) throw new Error("백엔드에 연결할 수 없습니다 — 백엔드 연결이 필요합니다.");
    const reader = res.body.getReader(), dec = new TextDecoder();
    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      let sep;
      while ((sep = buf.indexOf("\n\n")) !== -1) {
        const line = buf.slice(0, sep); buf = buf.slice(sep + 2);
        if (!line.startsWith("data: ")) continue;
        let ev; try { ev = JSON.parse(line.slice(6)); } catch { continue; }
        if (ev.error) { bodyEl.className = "body err"; bodyEl.textContent = ev.error; return; }
        if (ev.done) { bodyEl.classList.remove("cursor"); return; }
        if (ev.t) { full += ev.t; bodyEl.textContent = full; }
      }
    }
  } catch (e) {
    bodyEl.className = "body err"; bodyEl.textContent = "오류: " + (e.message || e);
  } finally { resumeBtn.disabled = false; }
}
resumeBtn.addEventListener("click", streamResume);

go.addEventListener("click", analyze);
$("url").addEventListener("keydown", e => { if (e.key === "Enter") analyze(); });
</script>
